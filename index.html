<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>躲避方块</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1 class="title">NEON DODGE</h1>
        <p class="subtitle">躲避圆球，活得越久分数越高</p>
      </header>

      <section class="panel">
        <div class="stats">
          <p class="chip">分数 <span id="score">0</span></p>
          <p class="chip">最高分 <span id="best-score">0</span></p>
          <p class="chip">状态 <span id="status">未开始</span></p>
          <button id="pause-btn" type="button" class="pause-btn" disabled>暂停</button>
        </div>

        <div
          id="game-area"
          class="game-area"
          role="application"
          aria-label="躲避方块游戏区域"
        >
          <div id="player" class="player" aria-label="玩家"></div>

          <div id="overlay" class="overlay show">
            <p id="overlay-text">按空格开始游戏</p>
            <button id="start-btn" type="button">开始 / 重新开始</button>
            <small>方向键/WASD 移动，暂停按钮可继续/暂停</small>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>

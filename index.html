<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>躲避方块</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="title">躲避方块</h1>

      <section class="panel">
        <div class="stats">
          <p>分数：<span id="score">0</span></p>
          <p>最高分：<span id="best-score">0</span></p>
          <p>状态：<span id="status">未开始</span></p>
        </div>

        <div
          id="game-area"
          class="game-area"
          role="application"
          aria-label="躲避方块游戏区域"
        >
          <div id="player" class="player" aria-label="玩家"></div>

          <div id="overlay" class="overlay show">
            <p id="overlay-text">按空格开始游戏</p>
            <button id="start-btn" type="button">开始 / 重新开始</button>
            <small>操作：方向键 或 WASD</small>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>

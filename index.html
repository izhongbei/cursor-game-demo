<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光速闪击</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1 class="title">光速闪击</h1>
        <p class="subtitle">躲避圆球，活得越久分数越高</p>
      </header>

      <section class="panel">
        <div class="stats">
          <p class="chip">分数 <span id="score">0</span></p>
          <p class="chip">最高分 <span id="best-score">0</span></p>
          <p class="chip">连击 <span id="combo-count">x0</span></p>
          <p class="chip">波次 <span id="wave">1</span></p>
          <p class="chip">模式 <span id="mode-label">标准</span></p>
          <p class="chip">护盾 <span id="shield-count">0</span></p>
          <p class="chip">冲刺CD <span id="dash-cooldown">0.0s</span></p>
          <p class="chip">状态 <span id="status">未开始</span></p>
          <button id="pause-btn" type="button" class="pause-btn" disabled>暂停</button>
        </div>

        <div class="play-layout">
          <div
            id="game-area"
            class="game-area"
            role="application"
            aria-label="躲避方块游戏区域"
          >
            <div id="player" class="player" aria-label="玩家"></div>
            <div id="boss-banner" class="boss-banner">BOSS 事件：弹幕模式</div>
            <div id="laser" class="laser"></div>
            <div id="danger-vignette" class="danger-vignette"></div>
            <div id="feedback-layer" class="feedback-layer" aria-hidden="true"></div>
            <div id="effect-bar" class="effect-bar">
              <span id="slow-status" class="effect-chip">减速: 关闭</span>
              <span id="double-status" class="effect-chip">双倍分: 关闭</span>
              <span id="fever-status" class="effect-chip">狂欢: 关闭</span>
            </div>
            <div id="achievement-toast" class="achievement-toast"></div>
            <div id="overlay" class="overlay show">
              <p id="overlay-text">按空格开始游戏</p>
              <button id="start-btn" type="button">开始 / 重新开始</button>
              <small>方向键/WASD 移动，Shift 冲刺，暂停按钮可继续/暂停</small>
            </div>
          </div>

          <aside class="side-panels" aria-label="游戏信息面板">
            <div class="mini-panel">
              <h3>模式选择</h3>
              <div class="mode-row">
                <button id="mode-normal-btn" type="button" class="mode-btn active">标准</button>
                <button id="mode-endless-btn" type="button" class="mode-btn">无尽</button>
              </div>
              <button id="fever-btn" type="button" class="fever-btn">一键狂欢</button>
            </div>
            <div class="mini-panel">
              <h3>成就</h3>
              <ul id="achievement-list" class="achievement-list"></ul>
            </div>
            <div class="mini-panel">
              <h3>无尽排行榜</h3>
              <ol id="leaderboard-list" class="leaderboard-list"></ol>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
